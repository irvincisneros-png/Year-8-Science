<body>
  <div id="root">
  <div id="__loading" style="position:fixed;inset:0;z-index:9000;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;background:#f7f1e3;color:#6b6a64;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
    <div class="__spin" style="width:34px;height:34px;border:3px solid #e3d9bf;border-top-color:#0f766e;border-radius:50%;animation:jsspin .8s linear infinite;"></div>
    <div style="font-size:15px;">Getting your science ready…</div>
    <style>@keyframes jsspin{to{transform:rotate(360deg)}}@media (prefers-reduced-motion:reduce){.__spin{animation:none!important}}</style>
  </div>
  </div>
  <script src="../shared/vendor/react.production.min.js"></script>
  <script src="../shared/vendor/react-dom.production.min.js"></script>

  <script type="text/babel" src="../shared/kit.jsx"></script>
  <script type="text/babel" src="content.jsx"></script>
  <noscript>
    <div style="position:fixed;inset:0;z-index:99998;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;background:#f7f1e3;color:#1b1a17;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
      This page needs JavaScript turned on to work. Please enable JavaScript in your browser settings and reload.
    </div>
  </noscript>
  <div id="__loadfail" style="display:none;position:fixed;inset:0;z-index:99999;align-items:center;justify-content:center;flex-direction:column;gap:10px;text-align:center;padding:24px;background:#f7f1e3;color:#1b1a17;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">

    <div style="max-width:430px;font-size:14px;color:#6b6a64;">Check your internet connection and refresh. If you're on the school network and it still won't load, let your teacher know.</div>
    <button onclick="location.reload()" style="margin-top:6px;padding:10px 18px;border-radius:999px;border:1.5px solid #1b1a17;background:#0f766e;color:#fff;font-weight:600;font-size:14px;cursor:pointer;">Refresh</button>
  </div>
  <script>
    /* If nothing has rendered into the app root after 12s (e.g. a script was
       blocked or failed to download), show a friendly failure message instead
       of a blank white screen. */
    (function(){
      setTimeout(function(){
        if(document.getElementById('__loading') && !window.__mounted){
          var f=document.getElementById('__loadfail'); if(f) f.style.display='flex';
        }
      },12000);
    })();
  </script>
